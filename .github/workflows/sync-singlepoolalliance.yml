name: Sync SinglePoolAlliance to cexplorer-community

on:
  schedule:
    # Check every 6 hours for changes to registry.json
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Check if registry.json has changed
        id: registry_check
        run: |
          # Get current SHA of registry.json from GitHub API
          CURRENT_SHA=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/SinglePoolAlliance/Registration/contents/registry.json" \
            | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d).sha)")

          echo "Current registry.json SHA: $CURRENT_SHA"

          # Read last known SHA from file in this repo
          LAST_SHA=""
          if [ -f ".last-registry-sha" ]; then
            LAST_SHA=$(cat .last-registry-sha)
          fi

          echo "Last known SHA: $LAST_SHA"

          if [ "$CURRENT_SHA" = "$LAST_SHA" ]; then
            echo "No change in registry.json — skipping."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "registry.json has changed — proceeding."
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "current_sha=$CURRENT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.registry_check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate singlepoolalliance.json
        if: steps.registry_check.outputs.changed == 'true'
        run: node scripts/generate-singlepoolalliance.mjs > /tmp/singlepoolalliance.json

      - name: Show generated file
        if: steps.registry_check.outputs.changed == 'true'
        run: |
          echo "Pool count: $(cat /tmp/singlepoolalliance.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d).members.length)")"
          head -20 /tmp/singlepoolalliance.json

      - name: Checkout cexplorer-community fork
        if: steps.registry_check.outputs.changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/cexplorer-community
          token: ${{ secrets.GH_PAT }}
          path: cexplorer-community

      - name: Copy generated file into fork
        if: steps.registry_check.outputs.changed == 'true'
        run: cp /tmp/singlepoolalliance.json cexplorer-community/mainnet/groups/singlepoolalliance.json

      - name: Create PR
        if: steps.registry_check.outputs.changed == 'true'
        working-directory: cexplorer-community
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a branch with today's date
          BRANCH="spa-sync-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"

          # Commit
          git add mainnet/groups/singlepoolalliance.json
          git commit -m "chore: sync SinglePoolAlliance group ($(date +%Y-%m-%d))"

          # Push to your fork
          git push origin "$BRANCH" --force

          # Open PR to upstream (vellum-labs/cexplorer-community)
          POOL_COUNT=$(node -e "const d=require('fs').readFileSync('mainnet/groups/singlepoolalliance.json','utf8'); console.log(JSON.parse(d).members.length)")

          # Check if an open PR already exists before creating one
          EXISTING_PR=$(gh pr list \
            --repo vellum-labs/cexplorer-community \
            --head "${{ github.repository_owner }}:$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for branch $BRANCH — skipping."
          else
            gh pr create \
              --repo vellum-labs/cexplorer-community \
              --head "${{ github.repository_owner }}:$BRANCH" \
              --base main \
              --title "chore: sync SinglePoolAlliance group ($(date +%Y-%m-%d))" \
              --body "$(cat <<EOF
          ## SinglePoolAlliance Group Sync

          Auto-generated from the [SinglePoolAlliance registry](https://github.com/SinglePoolAlliance/Registration/blob/master/registry.json).

          - **Pools in this update:** $POOL_COUNT
          - **Source:** https://github.com/SinglePoolAlliance/Registration/blob/master/registry.json
          - **Generated:** $(date -u +"%Y-%m-%d %H:%M UTC")

          This PR was created automatically when registry.json changed.
          EOF
              )"
          fi

      - name: Save registry SHA to prevent duplicate runs
        if: steps.registry_check.outputs.changed == 'true'
        run: |
          echo "${{ steps.registry_check.outputs.current_sha }}" > .last-registry-sha
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-registry-sha
          git commit -m "chore: update last known registry.json SHA"
          git push
